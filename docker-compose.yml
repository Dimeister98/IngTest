services:
  postgres:
    image: postgres:16
    container_name: ing-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - store-data:/var/lib/postgresql/data

volumes:
  store-data: